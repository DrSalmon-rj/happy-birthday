<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>21世纪应当使用用赛博贺卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
                overflow: hidden;
        }

        #media-layer {
            flex: 1;
            position: relative;
            background-color: #111;
        }

        #scene-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
        }

        #scene-video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        #dialogue-box {
            height: 30vh;
            background-color: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #444;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            z-index: 5;
        }

        #speaker-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffea;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #dialogue-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #eee;
            flex: 1;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2rem;
            background-color: #00ffea;
            margin-left: 3px;
            vertical-align: text-bottom;
        }

        #next-indicator {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 0.8rem;
            color: #666;
            transition: opacity 0.3s;
        }

        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .hidden { display: none !important; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-1px, -1px); }
            20% { transform: translate(-2px, 0px); }
            30% { transform: translate(1px, 1px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            60% { transform: translate(-1px, -1px); }
            70% { transform: translate(1px, 1px); }
            80% { transform: translate(-1px, -1px); }
            90% { transform: translate(1px, 1px); }
            100% { transform: translate(0px, 0px); }
        }
        .effect-shake {
            animation: shake 0.4s ease-in-out both;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999;
            background-color: #050505;
            background-image: url('img/start.gif'); /* 你的背景图路径 */
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: opacity 0.8s ease;
            /* 移除了原本的 flex 居中代码，改用绝对定位 */
        }

        #start-hint {
            position: absolute;
            bottom: 33%; /* 控制在距离底部 1/3 (约 33%) 的位置 */
            left: 50%;
            transform: translateX(-50%); /* 确保文字绝对水平居中 */
            font-size: 1.2rem;
            color: #eee; /* 稍微调亮了一点，在图上更清晰 */
            letter-spacing: 4px; /* 字间距拉开，更有呼吸感 */
            animation: blink 1.5s infinite;
        }
        /* ================================== */
        /* ================================== */
    </style>
</head>
<body>
<div id="start-screen">
    <div id="start-hint">- 点击进入 -</div>
</div>
<div id="game-container">
    <div id="media-layer">
        <div id="scene-image" class="hidden"></div>
        <video id="scene-video" class="hidden" autoplay loop muted playsinline></video>
    </div>

    <div id="dialogue-box">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
        <div id="next-indicator">点击继续...</div>
    </div>
</div>

<div id="puzzle-container" class="hidden"></div>

<script src="data.js"></script>

<script src="game.js"></script>

<script src="puzzle1.js"></script>

<script src="puzzle2.js"></script>

<script src="puzzle3.js"></script>

<script src="game.js"></script>

</body>
</html>
